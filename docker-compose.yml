services:
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --interval 60
      --label-enable
      --cleanup

  redis:
    image: redis:7-alpine
    container_name: maichess-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - db_network

  postgres:
    image: postgres:16
    container_name: maichess-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - db_network

  mongo:
    image: mongo:7
    container_name: maichess-mongo
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - db_network

  user-service:
    image: ghcr.io/maichess/maichess-user-service:${USER_SERVICE_TAG:-main}
    container_name: maichess-user-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_SECRET}
    ports:
      - "10101:8080"
      - "10102:8081"
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  auth-service:
    image: ghcr.io/maichess/maichess-auth-service:${AUTH_SERVICE_TAG:-main}
    container_name: maichess-auth-service
    restart: unless-stopped
    depends_on:
      - postgres
      - user-service
    env_file: .env
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      USER_SERVICE_GRPC_ADDR: user-service:8081
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    ports:
      - "10111:3000"
      - "10112:50051"
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  move-validator-service:
    image: ghcr.io/maichess/maichess-move-validator-service:${MOVE_VALIDATOR_SERVICE_TAG:-main}
    container_name: maichess-move-validator-service
    restart: unless-stopped
    environment:
      GRPC_PORT: 50055
    ports:
      - "10122:50055"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  engine-service:
    image: ghcr.io/maichess/maichess-engine-service:${ENGINE_SERVICE_TAG:-main}
    container_name: maichess-engine-service
    restart: unless-stopped
    environment:
      GRPC_PORT: 50056
    ports:
      - "10132:50056"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  match-maker-service:
    image: ghcr.io/maichess/maichess-match-maker-service:${MATCH_MAKER_SERVICE_TAG:-main}
    container_name: maichess-match-maker-service
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      MatchManager__Url: "http://match-manager-service:8081"
      Jwt__Key: ${JWT_SECRET}
    ports:
      - "10141:8080"
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  match-manager-service:
    image: ghcr.io/maichess/maichess-match-manager-service:${MATCH_MANAGER_SERVICE_TAG:-main}
    container_name: maichess-match-manager-service
    restart: unless-stopped
    depends_on:
      - mongo
      - move-validator-service
      - engine-service
      - user-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MongoDB: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017"
      Services__MoveValidatorService: "http://move-validator-service:50055"
      Services__EngineService: "http://engine-service:50056"
      Services__UserService: "http://user-service:8081"
      Jwt__Key: ${JWT_SECRET}
    ports:
      - "10151:8080"
      - "10152:8081"
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  db_network:
    name: db_network
    driver: bridge
  services_network:
    name: services_network
    driver: bridge