services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: maichess-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - otel_spans:/var/log/otel
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - services_network
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.7.2
    container_name: maichess-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    networks:
      - services_network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: maichess-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - services_network
    depends_on:
      - tempo

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --interval 60
      --label-enable
      --cleanup

  redis:
    image: redis:7-alpine
    container_name: maichess-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - db_network

  postgres:
    image: postgres:16
    container_name: maichess-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - db_network

  mongo:
    image: mongo:7
    container_name: maichess-mongo
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - db_network

  user-db:
    image: ghcr.io/maichess/maichess-database-service:${DATABASE_SERVICE_TAG:-main}
    container_name: maichess-user-db
    restart: unless-stopped
    depends_on:
      - postgres
      - otel-collector
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Adapter: postgres
      Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Database__ReadOnly: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: user-db
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  user-db-ro:
    image: ghcr.io/maichess/maichess-database-service:${DATABASE_SERVICE_TAG:-main}
    container_name: maichess-user-db-ro
    restart: unless-stopped
    depends_on:
      - postgres
      - otel-collector
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Adapter: postgres
      Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Database__ReadOnly: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: user-db-ro
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  match-db:
    image: ghcr.io/maichess/maichess-database-service:${DATABASE_SERVICE_TAG:-main}
    container_name: maichess-match-db
    restart: unless-stopped
    depends_on:
      - mongo
      - otel-collector
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Adapter: mongo
      Database__ConnectionString: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017"
      Database__ReadOnly: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: match-db
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  user-service:
    image: ghcr.io/maichess/maichess-user-service:${USER_SERVICE_TAG:-main}
    container_name: maichess-user-service
    restart: unless-stopped
    depends_on:
      - user-db
      - otel-collector
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Services__DatabaseService: "http://user-db:8080"
      Jwt__Key: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10101:8080"
      - "10102:8081"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  auth-service:
    image: ghcr.io/maichess/maichess-auth-service:${AUTH_SERVICE_TAG:-main}
    container_name: maichess-auth-service
    restart: unless-stopped
    depends_on:
      - redis
      - user-db-ro
      - user-service
      - otel-collector
    env_file: .env
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      USER_SERVICE_GRPC_ADDR: user-service:8081
      USER_DB_SERVICE_GRPC_ADDR: user-db-ro:8080
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10111:3000"
      - "10112:50051"
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  move-validator-service:
    image: ghcr.io/maichess/maichess-move-validator-service:${MOVE_VALIDATOR_SERVICE_TAG:-main}
    container_name: maichess-move-validator-service
    restart: unless-stopped
    depends_on:
      - otel-collector
    environment:
      GRPC_PORT: 50055
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10122:50055"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  engine-service:
    image: ghcr.io/maichess/maichess-engine-service:${ENGINE_SERVICE_TAG:-main}
    container_name: maichess-engine-service
    restart: unless-stopped
    depends_on:
      - otel-collector
    environment:
      GRPC_PORT: 50056
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10132:50056"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  socket-service:
    image: ghcr.io/maichess/maichess-socket-service:${SOCKET_SERVICE_TAG:-main}
    container_name: maichess-socket-service
    restart: unless-stopped
    depends_on:
      - auth-service
      - otel-collector
    environment:
      NODE_ENV: production
      AUTH_SERVICE_GRPC_ADDR: "auth-service:50051"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10171:3000"
      - "10172:50051"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  match-maker-service:
    image: ghcr.io/maichess/maichess-match-maker-service:${MATCH_MAKER_SERVICE_TAG:-main}
    container_name: maichess-match-maker-service
    restart: unless-stopped
    depends_on:
      - redis
      - engine-service
      - socket-service
      - otel-collector
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      MatchManager__Url: "http://match-manager-service:8081"
      Engine__Url: "http://engine-service:50056"
      Services__SocketService: "http://socket-service:50051"
      Jwt__Key: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10141:8080"
    networks:
      - db_network
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  match-manager-service:
    image: ghcr.io/maichess/maichess-match-manager-service:${MATCH_MANAGER_SERVICE_TAG:-main}
    container_name: maichess-match-manager-service
    restart: unless-stopped
    depends_on:
      - match-db
      - move-validator-service
      - engine-service
      - user-service
      - socket-service
      - otel-collector
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Services__DatabaseService: "http://match-db:8080"
      Services__MoveValidatorService: "http://move-validator-service:50055"
      Services__EngineService: "http://engine-service:50056"
      Services__UserService: "http://user-service:8081"
      Services__SocketService: "http://socket-service:50051"
      Jwt__Key: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    ports:
      - "10151:8080"
      - "10152:8081"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  client:
    image: ghcr.io/maichess/maichess-client:${CLIENT_TAG:-main}
    container_name: maichess-client
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - match-maker-service
      - match-manager-service
      - socket-service
    environment:
      AUTH_SERVICE_URL: "http://auth-service:3000"
      USER_SERVICE_URL: "http://user-service:8080"
      MATCH_MAKER_URL: "http://match-maker-service:8080"
      MATCH_MANAGER_URL: "http://match-manager-service:8080"
      # NEXT_PUBLIC_SOCKET_URL must be set at image build time — set this to the externally reachable socket-service URL
    ports:
      - "10161:3000"
    networks:
      - services_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


volumes:
  postgres_data:
  mongo_data:
  redis_data:
  tempo_data:
  grafana_data:
  otel_spans:

networks:
  db_network:
    name: db_network
    driver: bridge
  services_network:
    name: services_network
    driver: bridge