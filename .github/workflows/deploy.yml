name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DROPLET_HOST }}
          username: ${{ vars.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script: |
            cd /maichess/maichess-deploy
            ./restart.sh